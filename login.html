<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Next-Physical AI Dynamics</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <header id="header" class="scrolled">
        <nav class="container">
            <div class="logo"><a href="index.html">NEXT-<span>PHYSICAL AI</span></a></div>
            <ul class="nav-menu">
                <li><a href="index.html#technology">회사소개</a></li>
                <li><a href="index.html#business">사업분야</a></li>
                <li><a href="dashboard.html">대시보드</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-wrap">
        <div class="login-card reveal">
            <h2>로그인</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit" class="btn-login-submit">로그인하기</button>
            </form>
            <div style="margin-top: 20px; font-size: 0.9rem; color: #666;">
                <a href="#">아이디 찾기</a> | <a href="#">비밀번호 찾기</a> | <a href="#">회원가입</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // 간단한 모의 로그인 성공 처리
            alert('로그인에 성공했습니다!');
            location.href = 'mypage.html';
        });
    </script>
</body>
</html>
